data:
  root: /kfs2/projects/gogpt/Ebadmus/training_data/minimal_component_ifields
  cache_dir: /kfs2/projects/gogpt/Ebadmus/Training_new/cache/e1_onefeeder
  feeder_offset: 54
  limit_feeders: 1
  cast_float32: false
  train_frac: 1.0
  val_frac: 0.0
  train_variants: 80
  eval_variants: 20
  samples_per_epoch: 80
  num_workers: 2
mask:
  mixture: {pf: 1.0}
  p_voltage: 1.0
  p_current: 1.0
  p_icomp: 0.0
  p_admittance: 0.0
  p_terminal: 0.0
  p_component: 0.0
model: {hidden: 128, steps: 8, dropout: 0.0}
loss:
  feat_clamp: 20.0
  lambda_recon: 1.0
  recon_weights: {voltage: 1.0, y: 0.0, icomp: 0.0, ibus: 0.0}
  lambda_edge: 0.0
  lambda_drop: 0.0
  lambda_elem: 0.0
  lambda_kcl: 0.0
  drop_floor: 0.0001
train:
  seed: 42
  epochs: 200
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0
  grad_clip: 1.0
  warmup_steps: 10
  eval_every: 20
  amp: fp32
  init_ckpt: /kfs2/projects/gogpt/Ebadmus/Training_new/runs/e1_voltage_only_line_load/best_voltage.pt
  out_dir: /kfs2/projects/gogpt/Ebadmus/Training_new/runs/e1_voltage_fp32_ft
wandb:
  enabled: true
  project: Training_new_GridFM
  name: e1_voltage_fp32_ft
  tags: [capacity-gate, voltage-only, fp32-finetune, pf]

