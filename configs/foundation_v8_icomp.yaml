data:
  root: /kfs2/projects/gogpt/Ebadmus/training_data_foundation_v8_fractional
  cache_dir: /kfs2/projects/gogpt/Ebadmus/Training_new/cache/foundation_v8_fractional
  feeder_offset: 700
  cast_float32: true
  train_frac: 0.8
  val_frac: 0.1
  train_variants: 3
  eval_variants: 1
  samples_per_epoch: 1000000
  num_workers: 6
  exact_metadata_workers: 6
  prefetch_factor: 2
  feature_min_std: 1.0e-8
# Pure injection diagnostic. random_safe already reaches this mode on 20% of
# samples, so the baseline is not Icomp-blind -- the question this arm answers is
# whether 5x the injection exposure moves the 94.6% Icomp WAPE at all, or whether
# the target is unlearnable from one snapshot regardless of how often it is shown.
# Rates are omitted deliberately: injection mode hardcodes its own (see
# validate_mask_cfg); listing them here would only look like control.
mask:
  mixture: {injection: 1.0}
model:
  hidden: 384
  steps: 12
  dropout: 0.0
  normalize_features: true
  use_electrical_pe: false
  role_residual_heads: true
  exact_line_metadata: true
  exact_transformer_metadata: true
  exact_generator_metadata: true
  exact_capacitor_metadata: true
  exact_reactor_metadata: true
  exact_load_metadata: true
  exact_pvsystem_metadata: true
  exact_vsource_metadata: true
  exact_storage_metadata: true
loss:
  feat_clamp: 20.0
  lambda_recon: 1.0
  recon_weights: {voltage: 10.0, y: 1.0, icomp: 1.0, ibus: 1.0}
  lambda_edge: 0.02
  lambda_drop: 0.02
  lambda_elem: 2.0e-6
  lambda_kcl: 1.0e-6
  drop_floor: 1.0e-4
  lambda_ibus_wape: 0.1
  lambda_tree_line_wape: 0.0
  tree_min_truth_abs: 0.0
  balance_stores: 1.0
  lambda_transformer_wape: 0.1
train:
  seed: 31
  epochs: 36
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  warmup_steps: 0
  eval_every: 3
  amp: bf16
  out_dir: /kfs2/projects/gogpt/Ebadmus/Training_new/runs/foundation_v8_icomp
  foundation_task_fields:
    pf: [V, Ibus]
    se_known: [V, Ibus]
    param_one: [Y]
    injection: [Icomp]
    random_safe: [V, Y, Icomp, Ibus]
    random: [V, Y, Icomp, Ibus]
wandb:
  enabled: true
  project: Training_new_GridFM
  tags: [foundation-v8, topology-grouped, exact-all-nine-y, fractional]
