# R1 probe: does a dedicated reactor (and line) current WAPE loss reduce the
# unseen current wall? E51 has no lambda_reactor_wape; attribution shows reactor
# current drives line/vsource/aggregate. Same 2000-feeder seed-42 split as E51
# (unseen stays unseen), shrunk samples_per_epoch for a fast probe. Init from E51.
data:
  root: /kfs2/projects/gogpt/Ebadmus/training_data/minimal_component
  cache_dir: /kfs2/projects/gogpt/Ebadmus/Training_new/cache/e10_det2f_wape_h384_2000
  feeder_offset: 0
  limit_feeders: 2000
  cast_float32: false
  train_frac: 0.8
  val_frac: 0.1
  train_variants: 20
  eval_variants: 10
  samples_per_epoch: 10000
  num_workers: 8
  feature_min_std: 1.0e-08
mask:
  mixture:
    pf: 0.35
    se_known: 0.25
    param_one: 0.2
    injection: 0.2
  p_voltage: 0.3
  p_current: 0.15
  p_icomp: 0.0
  p_admittance: 0.0
  p_terminal: 0.0
  p_component: 0.0
model:
  hidden: 384
  steps: 12
  dropout: 0.0
  normalize_features: true
  use_electrical_pe: false
  role_residual_heads: true
loss:
  feat_clamp: 20.0
  lambda_recon: 1.0
  recon_weights:
    voltage: 10.0
    y: 1.0
    icomp: 1.0
    ibus: 1.0
  lambda_edge: 0.02
  lambda_drop: 0.02
  lambda_elem: 2.0e-06
  lambda_kcl: 1.0e-06
  drop_floor: 0.0001
  lambda_ibus_wape: 0.1
  lambda_transformer_wape: 0.1
  lambda_reactor_wape: 0.3
  lambda_line_wape: 0.2
  balance_stores: 1.0
train:
  seed: 42
  epochs: 18
  batch_size: 64
  lr: 1.0e-05
  weight_decay: 0.0
  grad_clip: 1.0
  warmup_steps: 150
  eval_every: 3
  amp: bf16
  out_dir: /kfs2/projects/gogpt/Ebadmus/Training_new/runs/r1_reactor_wape
  init_ckpt: /kfs2/projects/gogpt/Ebadmus/Training_new/runs/foundation_best/checkpoint.pt
  foundation_task_fields:
    pf: [V, Ibus, Ibus_line, Ibus_transformer, Ibus_reactor, Ibus_load, Ibus_vsource]
    se_known: [V, Ibus, Ibus_line, Ibus_transformer, Ibus_reactor, Ibus_load, Ibus_vsource]
    param_one: [Y, Y_line, Y_transformer, Y_reactor, Y_capacitor, Y_load, Y_generator, Y_pvsystem, Y_storage, Y_vsource]
    injection: [Icomp, Icomp_load, Icomp_generator, Icomp_pvsystem, Icomp_storage, Icomp_vsource]
wandb:
  enabled: true
  project: Training_new_GridFM
  name: r1_reactor_wape
  tags: [probe, reactor, current, r1]
