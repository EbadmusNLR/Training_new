# Foundation model on REAL SMART-DS data with the learned iterative solver
# (completed-current KCL residual feedback, task-agnostic). SMART-DS feeders are
# large (3k-8k nodes) and reactor-free, so current error is voltage-bounded and
# the element to watch is the transformer. Train from scratch (no reactor artifact).
data:
  root: /kfs2/projects/gogpt/Ebadmus/training_data/smartds1000
  cache_dir: /kfs2/projects/gogpt/Ebadmus/Training_new/cache/smartds1000
  feeder_offset: 0
  limit_feeders: null
  cast_float32: false
  train_frac: 0.8
  val_frac: 0.1
  train_variants: 24
  eval_variants: 6
  samples_per_epoch: 6000
  num_workers: 12
  feature_min_std: 1.0e-08
mask:
  mixture:
    pf: 0.35
    se_known: 0.25
    param_one: 0.2
    injection: 0.2
  p_voltage: 0.3
  p_current: 0.15
  p_icomp: 0.0
  p_admittance: 0.0
  p_terminal: 0.0
  p_component: 0.0
model:
  hidden: 256
  steps: 12
  dropout: 0.0
  normalize_features: false
  use_electrical_pe: false
  role_residual_heads: true
  kcl_feedback: true
loss:
  feat_clamp: 20.0
  lambda_recon: 1.0
  recon_weights:
    voltage: 10.0
    y: 1.0
    icomp: 1.0
    ibus: 1.0
  lambda_edge: 0.02
  lambda_drop: 0.02
  lambda_elem: 2.0e-06
  lambda_kcl: 1.0e-06
  drop_floor: 0.0001
  lambda_ibus_wape: 0.1
  lambda_transformer_wape: 0.1
  balance_stores: 1.0
train:
  seed: 42
  epochs: 40
  batch_size: 6
  lr: 4.0e-04
  weight_decay: 0.0
  grad_clip: 1.0
  warmup_steps: 500
  eval_every: 4
  amp: bf16
  out_dir: /kfs2/projects/gogpt/Ebadmus/Training_new/runs/smartds_kcl
  foundation_task_fields:
    pf: [V, Ibus, Ibus_line, Ibus_transformer, Ibus_load, Ibus_vsource]
    se_known: [V, Ibus, Ibus_line, Ibus_transformer, Ibus_load, Ibus_vsource]
    param_one: [Y, Y_line, Y_transformer, Y_capacitor, Y_load, Y_pvsystem, Y_storage, Y_vsource]
    injection: [Icomp, Icomp_load, Icomp_pvsystem, Icomp_storage, Icomp_vsource]
wandb:
  enabled: true
  project: Training_new_GridFM
  name: smartds_kcl
  tags: [smartds, real-data, kcl-feedback, iterative-solver, foundation]
